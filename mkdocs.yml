site_name: GIAE
site_description: Genome Interpretation & Annotation Engine — explainable, evidence-first genome annotation. Every prediction shows its reasoning.
site_url: https://Ayo-Cyber.github.io/GIAE/
repo_url: https://github.com/Ayo-Cyber/GIAE
repo_name: Ayo-Cyber/GIAE
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/mark.svg
  favicon: assets/mark.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.tooltips

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ayo-Cyber/GIAE
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/giae/
  version:
    provider: mike

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Reference:
    - CLI: cli.md
    - Python API: python_api.md
    - REST API: rest_api.md
  - Guides:
    - Architecture: architecture.md
    - Benchmarks: benchmarks.md
    - Deployment: deployment.md
    - Extending GIAE: extending.md
  - Tutorials:
    - Phage annotation: tutorials/phage.md
  - Project:
    - Roadmap: roadmap.md
    - Contributing: contributing.md
    - Changelog: changelog.md
