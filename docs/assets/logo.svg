<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="GIAE — Genome Interpretation and Annotation Engine">
  <defs>
    <linearGradient id="indigoStrand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="indigoNet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- DNA double helix mark -->
  <g transform="translate(30, 30)">
    <!-- Strand A (left curve, vertical) -->
    <path d="M 10 0 C 50 25 -30 75 10 100 C 50 125 -30 175 10 200 C 50 175 -30 125 10 100 C 50 75 -30 25 10 0 Z" fill="none" stroke="url(#indigoStrand)" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Strand B (mirror) -->
    <path d="M 70 0 C 30 25 110 75 70 100 C 30 125 110 175 70 200 C 30 175 110 125 70 100 C 30 75 110 25 70 0 Z" fill="none" stroke="url(#indigoStrand)" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
    <!-- Rungs -->
    <g stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.75">
      <line x1="14" y1="12" x2="66" y2="12"/>
      <line x1="6" y1="35" x2="74" y2="35"/>
      <line x1="6" y1="60" x2="74" y2="60"/>
      <line x1="14" y1="85" x2="66" y2="85"/>
      <line x1="14" y1="115" x2="66" y2="115"/>
      <line x1="6" y1="140" x2="74" y2="140"/>
      <line x1="6" y1="165" x2="74" y2="165"/>
      <line x1="14" y1="188" x2="66" y2="188"/>
    </g>
    <!-- Base-pair nodes -->
    <g fill="#a5b4fc">
      <circle cx="14" cy="12" r="3"/>
      <circle cx="66" cy="12" r="3"/>
      <circle cx="6"  cy="35" r="3"/>
      <circle cx="74" cy="35" r="3"/>
      <circle cx="6"  cy="60" r="3"/>
      <circle cx="74" cy="60" r="3"/>
      <circle cx="14" cy="85" r="3"/>
      <circle cx="66" cy="85" r="3"/>
      <circle cx="14" cy="115" r="3"/>
      <circle cx="66" cy="115" r="3"/>
      <circle cx="6"  cy="140" r="3"/>
      <circle cx="74" cy="140" r="3"/>
      <circle cx="6"  cy="165" r="3"/>
      <circle cx="74" cy="165" r="3"/>
      <circle cx="14" cy="188" r="3"/>
      <circle cx="66" cy="188" r="3"/>
    </g>
  </g>

  <!-- Molecular / network mark on right of DNA -->
  <g transform="translate(120, 55)" stroke="url(#indigoNet)" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Network edges -->
    <line x1="10" y1="20" x2="40" y2="5"/>
    <line x1="10" y1="20" x2="35" y2="40"/>
    <line x1="10" y1="20" x2="0"  y2="55"/>
    <line x1="40" y1="5"  x2="70" y2="20"/>
    <line x1="40" y1="5"  x2="55" y2="45"/>
    <line x1="35" y1="40" x2="55" y2="45"/>
    <line x1="35" y1="40" x2="20" y2="75"/>
    <line x1="55" y1="45" x2="75" y2="65"/>
    <line x1="55" y1="45" x2="40" y2="80"/>
    <line x1="20" y1="75" x2="40" y2="80"/>
    <line x1="0"  y1="55" x2="20" y2="75"/>
    <line x1="40" y1="80" x2="65" y2="90"/>
    <line x1="75" y1="65" x2="65" y2="90"/>
  </g>
  <!-- Network nodes -->
  <g transform="translate(120, 55)" fill="#a5b4fc">
    <circle cx="10" cy="20" r="3.5"/>
    <circle cx="40" cy="5"  r="3.5"/>
    <circle cx="70" cy="20" r="3.5"/>
    <circle cx="35" cy="40" r="3.5"/>
    <circle cx="55" cy="45" r="3.5"/>
    <circle cx="0"  cy="55" r="3.5"/>
    <circle cx="20" cy="75" r="3.5"/>
    <circle cx="75" cy="65" r="3.5"/>
    <circle cx="40" cy="80" r="3.5"/>
    <circle cx="65" cy="90" r="3.5"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, Helvetica Neue, Arial, sans-serif">
    <text x="225" y="110" font-size="78" font-weight="700" fill="url(#wordmark)" letter-spacing="-2">GIAE</text>
    <text x="227" y="145" font-size="13" font-weight="600" fill="#818cf8" letter-spacing="3.2">GENOME INTERPRETATION &amp; ANNOTATION ENGINE</text>
  </g>
</svg>
