<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="GIAE mark">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="strand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="200" height="200" rx="44" fill="url(#bg)"/>

  <!-- DNA mark, centred -->
  <g transform="translate(60, 30)">
    <!-- Strand A -->
    <path d="M 10 0 C 50 25 -30 75 10 100 C 50 125 -30 175 10 200 C 50 175 -30 125 10 100 C 50 75 -30 25 10 0 Z" fill="none" stroke="url(#strand)" stroke-width="5" stroke-linecap="round"/>
    <!-- Strand B -->
    <path d="M 70 0 C 30 25 110 75 70 100 C 30 125 110 175 70 200 C 30 175 110 125 70 100 C 30 75 110 25 70 0 Z" fill="none" stroke="url(#strand)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <!-- Rungs -->
    <g stroke="#e0e7ff" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="14" y1="14" x2="66" y2="14"/>
      <line x1="6"  y1="42" x2="74" y2="42"/>
      <line x1="6"  y1="72" x2="74" y2="72"/>
      <line x1="14" y1="100" x2="66" y2="100"/>
      <line x1="14" y1="130" x2="66" y2="130"/>
      <line x1="6"  y1="158" x2="74" y2="158"/>
      <line x1="14" y1="186" x2="66" y2="186"/>
    </g>
    <!-- Base-pair nodes -->
    <g fill="#ffffff">
      <circle cx="14" cy="14"  r="4"/>
      <circle cx="66" cy="14"  r="4"/>
      <circle cx="6"  cy="42"  r="4"/>
      <circle cx="74" cy="42"  r="4"/>
      <circle cx="6"  cy="72"  r="4"/>
      <circle cx="74" cy="72"  r="4"/>
      <circle cx="14" cy="100" r="4"/>
      <circle cx="66" cy="100" r="4"/>
      <circle cx="14" cy="130" r="4"/>
      <circle cx="66" cy="130" r="4"/>
      <circle cx="6"  cy="158" r="4"/>
      <circle cx="74" cy="158" r="4"/>
      <circle cx="14" cy="186" r="4"/>
      <circle cx="66" cy="186" r="4"/>
    </g>
  </g>
</svg>
