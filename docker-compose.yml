# GIAE pilot stack — frontend, API, worker, Redis, Postgres.
# Bring up with:  docker compose up -d --build
# Tear down with: docker compose down -v   (-v also wipes the named volumes)

x-api-env: &api-env
  DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-giae}:${POSTGRES_PASSWORD:-giae}@postgres:5432/${POSTGRES_DB:-giae}
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
  JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-60}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,https://app.giae.io}
  ENV: ${ENV:-prod}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-giae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-giae}
      POSTGRES_DB: ${POSTGRES_DB:-giae}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-giae} -d ${POSTGRES_DB:-giae}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [giae]
    # Don't expose Postgres outside the compose network in prod. Uncomment for local debugging.
    # ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [giae]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: giae-api:latest
    restart: unless-stopped
    environment:
      <<: *api-env
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/public_reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks: [giae]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: giae-api:latest
    restart: unless-stopped
    command:
      - celery
      - -A
      - giae_api.worker.celery_app
      - worker
      - --loglevel=info
      - --pool=threads
      - --concurrency=4
    environment:
      <<: *api-env
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/public_reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [giae]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: giae-frontend:latest
    restart: unless-stopped
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      API_URL: http://api:8000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"
    networks: [giae]

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  reports_data:

networks:
  giae:
    driver: bridge
